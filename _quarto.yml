project:
  type: website
  output-dir: _site
  pre-render: scripts/sync-ai-sidebar.py
  render:
    - index.qmd
    - 404.qmd
    - blog/
    - tutorials/
    - ai-tutorials/
  resources:
    - images/  # background photos referenced via inline-style url() aren't auto-detected
    - ai-tutorials/data/
    # - CNAME  # re-enable once DNS for the custom domain is configured

execute:
  freeze: auto # pre-render R; CI republishes from committed _freeze/ (no R needed)

