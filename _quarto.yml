project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - 404.qmd
    - blog/
    - tutorials/
    - ai-tutorials/
  resources:
    - images/  # background photos referenced via inline-style url() aren't auto-detected
    - ai-tutorials/data/
    # - CNAME  # re-enable once DNS for the custom domain is configured

execute:
  freeze: auto # pre-render R; CI republishes from committed _freeze/ (no R needed)

website:
  title: "Pablo Fuenzalida"
  favicon: favicon.svg
  # site-url: https://ecologistpablo.org  # restore once the custom domain is live
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: blog/index.qmd
        text: Blog
      - href: tutorials/index.qmd
        text: Human R Tutorials
      - href: ai-tutorials/index.qmd
        text: AI Tutorials
    right:
      - icon: instagram
        href: https://www.instagram.com/ecologist.pablo/
        aria-label: Instagram
      - icon: github
        href: https://github.com/ecologistpablo
        aria-label: GitHub
      - text: "<i class='ai ai-orcid' role='img' aria-label='ORCID'></i>"
        href: https://orcid.org/0009-0006-4844-2336
      - icon: linkedin
        href: https://www.linkedin.com/in/pablo-alfonso-fuenzalida-miralles-21914b1b2/
        aria-label: LinkedIn
  sidebar:
    - id: ai-curriculum
      title: "Coding curriculum"
      style: floating
      collapse-level: 2
      contents:
        - ai-tutorials/index.qmd
        - section: "Functional programming"
          contents:
            - section: "Beginner · Base R"
              contents: ai-tutorials/level-1-base-r/_quest-links.yml
            - section: "Intermediate · dplyr"
              contents: ai-tutorials/level-2-dplyr/_quest-links.yml
            - section: "Intermediate · purrr & furrr"
              contents: ai-tutorials/level-3-purrr/_quest-links.yml
            - section: "Advanced · data.table"
              contents: ai-tutorials/level-4-data-table/_quest-links.yml
        - section: "Computer science crash course"
          contents: ai-tutorials/cs-crash-course/_quest-links.yml
  page-footer:
    border: false
    left: "made with love (and AI) — Pablo Fuenzalida"
    right:
      - icon: instagram
        href: https://www.instagram.com/ecologist.pablo/
      - icon: github
        href: https://github.com/ecologistpablo
      - icon: envelope
        href: mailto:pablofuenzalida427@gmail.com
      - icon: linkedin
        href: https://www.linkedin.com/in/pablo-alfonso-fuenzalida-miralles-21914b1b2/

format:
  html:
    theme:
      # First listed = default appearance → dark by default, toggle to light.
      dark: [cosmo, theme-dark.scss, theme.scss]
      light: [cosmo, theme-light.scss, theme.scss]
    toc: false
    include-in-header:
      # Inter font + academicons (ORCID glyph isn't in Bootstrap Icons)
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
